# Force Ability Give Settings
force_ability:
  enabled: true                    # true = first join par ability milegi, false = nahi milegi
  give_on_first_join: true          # First join par ability dena hai?
  give_on_event: false              # Event mode active hai?
  event_timer: 0                    # Event timer in seconds (0 = disabled)
  event_ability: "random"           # "random" ya specific ability name
  event_broadcast: true              # Event ke baare me broadcast karna hai?
  
abilities:
