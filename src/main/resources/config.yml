# Spin Settings
spin:
  duration: 60
  frames: 60
  freeze_player: true
  celebration_particles: true

# Cooldown Display
cooldown:
  style: "diamond"  # diamond, gradient, block, arrow
  show_icon: true
  update_interval: 20

# Particle Settings
particles:
  enabled: true
  quality: "high"  # low, medium, high
  density: 1.0

# World Border
border:
  start_size: 20
  end_size: 20000
  grace_period: 60
  pvp_on_expand: true
