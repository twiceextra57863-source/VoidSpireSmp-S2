name: MythicAbilities
version: 1.0.0
main: com.mythicabilities.MythicAbilities
api-version: 1.21
author: YourName
description: Ultimate abilities plugin with voting system, 15 legendary katanas, dynamic scoreboard, and complete admin katana control

commands:
  # ============= ABILITY COMMANDS =============
  abilities:
    description: Open abilities menu
    usage: /abilities
    aliases: [ab, ability]
    
  # ============= SMP ADMIN COMMANDS =============
  smp:
    description: Main SMP control command
    usage: /smp <start|stop|status|set|border|pvp|grace|event|force|testcombo|help>
    permission: mythicabilities.admin
    aliases: [smpadmin, smpcontrol, smpmanage]
    
  # ============= ADMIN PANEL =============
  admin:
    description: Admin control panel
    usage: /admin
    permission: mythicabilities.admin
    aliases: [panel, control, apanel]
    
  # ============= ABILITY GIVE COMMAND =============
  giveability:
    description: Give ability to player
    usage: /giveability <player> <ability> or /giveability <ability> (self)
    permission: mythicabilities.admin
    aliases: [ga, giveabil, gabi, giveab]
    
  # ============= VOTING SYSTEM COMMANDS =============
  vote:
    description: Vote for a leader to form a kingdom
    usage: /vote <playername>
    permission: mythicabilities.vote
    aliases: [v, elect]
    
  team:
    description: Manage your kingdom/team
    usage: /team <info|setname|setcolor|setbanner|members|cooldown>
    permission: mythicabilities.team
    aliases: [kingdom, guild]
    
  katana:
    description: View your katana info (voting system)
    usage: /katana <info|list|ability>
    permission: mythicabilities.katana
    aliases: [k, blade, mykatana]
    
  leader:
    description: Leader specific commands
    usage: /leader <promote|kick|disband>
    permission: mythicabilities.leader
    aliases: [king, chief]
    
  # ============= SCOREBOARD COMMANDS =============
  scoreboard:
    description: Toggle scoreboard on/off
    usage: /scoreboard [on|off]
    permission: mythicabilities.scoreboard
    aliases: [sb, board, leaderboard, lb]
    
  # ============= KATANA ADMIN SYSTEM =============
  katanadmin:
    description: Complete katana admin control system
    usage: /katanadmin <give|giveall|giverandom|giverandomall|spin|spinall|list|info|check|remove|removeall|reload>
    permission: mythicabilities.katana.admin
    aliases: [kadmin, katanaadmin, ka, bladeadmin]

permissions:
  # ============= PLAYER PERMISSIONS =============
  mythicabilities.use:
    description: Allows using abilities
    default: true
    
  mythicabilities.vote:
    description: Can vote for leader
    default: true
    
  mythicabilities.team:
    description: Can use team commands
    default: true
    
  mythicabilities.katana:
    description: Can use katana commands (voting system)
    default: true
    
  mythicabilities.scoreboard:
    description: Can toggle scoreboard
    default: true
    
  # ============= LEADER PERMISSIONS =============
  mythicabilities.leader:
    description: Leader specific commands
    default: false
    
  mythicabilities.leader.promote:
    description: Can promote members
    default: false
    
  mythicabilities.leader.kick:
    description: Can kick members
    default: false
    
  mythicabilities.leader.disband:
    description: Can disband team
    default: false
    
  # ============= KATANA ADMIN PERMISSIONS =============
  mythicabilities.katana.admin:
    description: Full access to katana admin commands
    default: op
    children:
      mythicabilities.katana.give: true
      mythicabilities.katana.remove: true
      mythicabilities.katana.spin: true
      mythicabilities.katana.reload: true
      
  mythicabilities.katana.give:
    description: Can give katanas to players
    default: op
    
  mythicabilities.katana.remove:
    description: Can remove katanas from players
    default: op
    
  mythicabilities.katana.spin:
    description: Can start katana spins
    default: op
    
  mythicabilities.katana.reload:
    description: Can reload katana config
    default: op
    
  # ============= ADMIN PERMISSIONS =============
  mythicabilities.admin:
    description: Allows using admin commands
    default: op
    children:
      mythicabilities.use: true
      mythicabilities.vote: true
      mythicabilities.team: true
      mythicabilities.katana: true
      mythicabilities.leader: true
      mythicabilities.scoreboard: true
      mythicabilities.katana.admin: true
      
  mythicabilities.bypass.cooldown:
    description: Bypass ability cooldowns
    default: op
    
  mythicabilities.bypass.combo:
    description: Abilities always ready (no combo needed)
    default: op
    
  mythicabilities.event.create:
    description: Create ability events
    default: op
    
  mythicabilities.force.give:
    description: Force give abilities to players
    default: op
